modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
description='''
AE2 Create Compat - Applied Energistics 2 与 Create (机械动力) 的自动化兼容 Mod。

主要功能：
- ME Exporter: 从 AE2 ME 网络导出物品到 Create 管道/传送带
- ME Importer: 从 Create 管道/传送带导入物品到 AE2 ME 网络
- ME Pattern Provider: 通过 Create 设备驱动 AE2 的自动化合成

支持 Create 设备：
- 传送带 (Belt) - 物品传输
- 机械臂 (Mechanical Arm) - 物品分配
- 漏斗 (Chute) - 垂直传输
- 发射器 (Deployer) - 模拟交互
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

# AE2 作为软依赖（可选但功能需要）
[[dependencies.${mod_id}]]
modId="ae2"
type="optional"
ordering="AFTER"
side="BOTH"

# Create 作为软依赖（可选但功能需要）
[[dependencies.${mod_id}]]
modId="create"
type="optional"
ordering="AFTER"
side="BOTH"
